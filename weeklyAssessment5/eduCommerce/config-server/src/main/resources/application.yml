server:
  port: 8888

spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:https://github.com/yash617raj/educommerce-config}
          default-label: main
          search-paths: configs
          clone-on-start: false
        native:
          search-locations: classpath:/configs

  profiles:
    active: native

management:
  endpoints:
    web:
      exposure:
        include: health,info,refresh
